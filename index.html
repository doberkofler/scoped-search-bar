<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Scoped Search Bar</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
	</head>
	<body>
		<main class="demo-shell">
			<section class="demo-hero" aria-labelledby="demo-title">
				<p class="demo-eyebrow">Dependency-free TypeScript UI component</p>
				<h1 id="demo-title">Search everywhere, then narrow the scope.</h1>
				<p class="demo-copy">
					A compact search control that combines a text query, a multi-select scope menu, async submission, and a polished responsive layout.
				</p>

				<div class="demo-card">
					<div id="scoped-search-bar"></div>
				</div>
			</section>

			<section class="demo-panel" aria-label="Demo controls and events">
				<div class="demo-controls">
					<button id="reset-btn" class="demo-btn" type="button">Reset</button>
					<button id="disable-btn" class="demo-btn" type="button" aria-pressed="false">Disable</button>
					<button id="theme-btn" class="demo-btn" type="button" aria-pressed="false">Dark Theme</button>
				</div>
				<label class="demo-log-label" for="event-log">Event Log</label>
				<textarea id="event-log" class="demo-event-log" readonly></textarea>
			</section>
		</main>

		<script type="module" src="src/demo/app.ts"></script>
	</body>
</html>
